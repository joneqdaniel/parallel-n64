id: paper-mario-file-select
game: paper_mario
description: >
  Deterministic Paper Mario file select fixture with an authoritative
  file-select savestate for steady-state capture and a title-screen bootstrap
  path for reminting that state when needed.

content:
  rom_path: assets/Paper Mario (USA).zip
  core: parallel_n64
  hires_pack_path: assets/PAPER MARIO_HIRESTEXTURES.hts

entry:
  method: savestate
  reference: file_select_idle
  authority: authoritative_file_select_savestate
  target_state: file_select_idle

authority:
  graph_path: tools/fixtures/paper-mario-authority-graph.yaml
  node_id: file_select_idle
  preferred_mode: authoritative
  bootstrap_parent_fixture_id: paper-mario-title-screen
  remint_script: tools/scenarios/remint-paper-mario-file-select-authority.sh

requirements:
  assets:
    - assets/Paper Mario (USA).zip
    - assets/PAPER MARIO_HIRESTEXTURES.hts
  environment:
    - RetroArch must be available at the canonical local path in docs/WORKSPACE_PATHS.md

runtime:
  internal_scale: 4x
  execution_mode: serial
  display_required: true

capture:
  screenshots:
    - file_select
  frames:
    - file_select
  logs: true
  memory: false
  traces:
    - config_snapshot
    - controller_script
    - fallback_reporting
    - replacement_hit_miss_summary

checks:
  visual:
    - file select screen renders without corruption
    - no extra dots, dithering-like breakup, or visible texture corruption
    - baseline-off mode remains visually safe
  telemetry:
    - bundle includes ROM hash
    - bundle includes hi-res pack hash when present
    - bundle includes config snapshot
    - bundle includes the active authority mode and active state hash
    - bundle includes the scripted input path when bootstrap authority is used
  traces:
    - bundle records fallback reasons when replacement is not applied

notes:
  - The canonical file-select path is now `load savestate -> settle 3 frames -> screenshot`.
  - The bootstrap path remains `title-screen savestate -> START held for 60 frames -> settle 2 frames -> save file-select savestate`.
  - The current authoritative file-select state was minted from bootstrap save offset `2`.
  - Use `tools/scenarios/remint-paper-mario-file-select-authority.sh` to remint this authority intentionally.
