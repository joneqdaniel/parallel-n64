id: paper-mario-title-screen
game: paper_mario
description: >
  Baseline Paper Mario title screen fixture. This is the first strict Phase 1
  target for proving hi-res replacement without corruption.

content:
  rom_path: assets/Paper Mario (USA).zip
  core: parallel_n64
  savefile_path: ""
  hires_pack_path: assets/PAPER MARIO_HIRESTEXTURES.hts

entry:
  method: savestate
  reference: title_screen
  authority: authoritative_title_screen_savestate
  target_state: title_screen_idle

authority:
  graph_path: tools/fixtures/paper-mario-authority-graph.yaml
  node_id: title_screen_idle
  preferred_mode: authoritative
  bootstrap_parent_fixture_id: ""
  remint_script: ""

requirements:
  assets:
    - assets/Paper Mario (USA).zip
    - assets/PAPER MARIO_HIRESTEXTURES.hts
  environment:
    - RetroArch must be available at the canonical local path in docs/WORKSPACE_PATHS.md

runtime:
  internal_scale: 4x
  execution_mode: serial
  display_required: true

capture:
  screenshots:
    - title_screen
  frames:
    - title_screen
  logs: true
  memory: false
  traces:
    - config_snapshot
    - paper_mario_game_status
    - fallback_reporting
    - replacement_hit_miss_summary

checks:
  visual:
    - title logo renders without corruption
    - no extra dots, dithering-like breakup, or visible texture corruption
    - baseline-off mode remains visually safe
  telemetry:
    - bundle includes ROM hash
    - bundle includes savefile hash when present
    - bundle includes hi-res pack hash when present
    - bundle includes config snapshot
    - bundle includes the active authority mode and active state hash
  traces:
    - bundle records fallback reasons when replacement is not applied

notes:
  - The canonical title-screen path is now `load savestate -> settle 3 frames -> screenshot`.
  - Controller scripting remains relevant only when minting or replacing authoritative savestates.
  - The tracked runtime path now also snapshots and decodes the Paper Mario US `gGameStatus` window into `traces/paper-mario-game-status.json`.
